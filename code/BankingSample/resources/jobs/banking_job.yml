# Lakeflow Job definition.
# Chains the imperative notebooks: Bronze -> Silver -> Gold -> Troubleshoot.
# Demonstrates task dependencies and failure handling.

resources:
  jobs:
    banking_pipeline_job:
      name: "BankingSample - Notebook Pipeline"

      # Email alerts on job-level failure (separate from task-level).
      email_notifications:
        on_failure:
          - ${var.notification_email}
        no_alert_for_skipped_runs: true

      # Task-level orchestration.
      tasks:
        # ----- Bronze: Land raw CSVs as Delta tables -----
        - task_key: bronze_layer
          notebook_task:
            notebook_path: ../../notebooks/1_bronze_BankingSample.py
            source: WORKSPACE
          max_retries: 1
          min_retry_interval_millis: 60000
          timeout_seconds: 1800

        # ----- Silver: Clean and enrich Bronze data -----
        - task_key: silver_layer
          depends_on:
            - task_key: bronze_layer
          notebook_task:
            notebook_path: ../../notebooks/2_silver_BankingSample.py
            source: WORKSPACE
          max_retries: 1
          min_retry_interval_millis: 60000
          timeout_seconds: 1800

        # ----- Gold: PII masking, star schema, aggregated marts -----
        - task_key: gold_layer
          depends_on:
            - task_key: silver_layer
          notebook_task:
            notebook_path: ../../notebooks/3_gold_BankingSample.py
            source: WORKSPACE
          max_retries: 1
          min_retry_interval_millis: 60000
          timeout_seconds: 1800

        # ----- Diagnostics: Always runs, even on partial failure -----
        - task_key: diagnostics
          depends_on:
            - task_key: gold_layer
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../../notebooks/0_troubleshoot_BankingSample.py
            source: WORKSPACE
          timeout_seconds: 600